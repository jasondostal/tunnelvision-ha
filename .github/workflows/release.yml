name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VER=$(python3 -c "import json; print(json.load(open('custom_components/tunnelvision/manifest.json'))['version'])")
          TAG_VER="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VER" != "$TAG_VER" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VER) != tag ($TAG_VER)"
            exit 1
          fi
          echo "Version match: $TAG_VER"

      - name: Package integration
        run: |
          cd custom_components
          zip -r ../tunnelvision.zip tunnelvision/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: tunnelvision.zip
