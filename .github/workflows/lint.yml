name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install --quiet ruff bandit

      - name: Ruff (lint)
        run: ruff check custom_components/

      - name: Bandit (security — high severity)
        run: bandit -r custom_components/ -lll -q

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
