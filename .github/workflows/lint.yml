name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet ruff bandit mypy
          pip install --quiet homeassistant aiohttp

      - name: Ruff (lint)
        run: ruff check custom_components/

      - name: Bandit (security — high severity)
        run: bandit -r custom_components/ -lll -q

      - name: Mypy (type check)
        run: mypy custom_components/ --ignore-missing-imports

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
